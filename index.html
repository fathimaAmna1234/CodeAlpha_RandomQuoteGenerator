<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Quote Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 680px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #e94560;
      font-size: 1.6rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #e94560;
      margin: 10px auto 35px;
      border-radius: 5px;
    }

    .quote-icon {
      font-size: 4rem;
      color: rgba(233, 69, 96, 0.3);
      line-height: 1;
      margin-bottom: 10px;
    }

    .quote-text {
      font-size: 1.25rem;
      color: #ffffff;
      line-height: 1.8;
      font-style: italic;
      min-height: 80px;
      transition: opacity 0.4s ease;
    }

    .quote-author {
      margin-top: 20px;
      font-size: 1rem;
      color: #e94560;
      font-weight: 600;
      letter-spacing: 1px;
      transition: opacity 0.4s ease;
    }

    .quote-author::before {
      content: "— ";
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .btn-new {
      background: #e94560;
      color: white;
    }

    .btn-new:hover {
      background: #c73652;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
    }

    .btn-tweet {
      background: transparent;
      color: #1da1f2;
      border: 2px solid #1da1f2;
    }

    .btn-tweet:hover {
      background: #1da1f2;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(29, 161, 242, 0.3);
    }

    .btn-copy {
      background: transparent;
      color: #aaaaaa;
      border: 2px solid #aaaaaa;
    }

    .btn-copy:hover {
      background: #aaaaaa;
      color: #1a1a2e;
      transform: translateY(-3px);
    }

    .copy-msg {
      color: #4caf50;
      font-size: 0.85rem;
      margin-top: 12px;
      height: 18px;
    }

    .footer {
      margin-top: 30px;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
    }

    .fade {
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✨ Quote of the Moment</h1>
  <div class="divider"></div>

  <div class="quote-icon">"</div>
  <p class="quote-text" id="quoteText">Click the button to get inspired!</p>
  <p class="quote-author" id="quoteAuthor">CodeAlpha</p>

  <div class="buttons">
    <button class="btn-new" onclick="newQuote()">🔄 New Quote</button>
    <button class="btn-tweet" onclick="tweetQuote()">🐦 Tweet</button>
    <button class="btn-copy" onclick="copyQuote()">📋 Copy</button>
  </div>

  <p class="copy-msg" id="copyMsg"></p>

  <div class="footer">CodeAlpha Internship — App Development | Amanulla Fathima Amna</div>
</div>

<script>
  const quotes = [
    { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
    { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
    { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
    { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
    { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
    { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
    { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
    { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
    { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford" },
    { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
    { text: "An unexamined life is not worth living.", author: "Socrates" },
    { text: "Spread love everywhere you go.", author: "Mother Teresa" },
    { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt" },
    { text: "Always remember that you are absolutely unique.", author: "Margaret Mead" },
    { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
    { text: "You will face many defeats in life, but never let yourself be defeated.", author: "Maya Angelou" },
    { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
    { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln" },
    { text: "Never let the fear of striking out keep you from playing the game.", author: "Babe Ruth" },
    { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller" },
    { text: "Code is like humor. When you have to explain it, it's bad.", author: "Cory House" },
    { text: "First, solve the problem. Then, write the code.", author: "John Johnson" },
    { text: "Experience is the name everyone gives to their mistakes.", author: "Oscar Wilde" },
    { text: "The only source of knowledge is experience.", author: "Albert Einstein" },
    { text: "Dream big and dare to fail.", author: "Norman Vaughan" },
  ];

  let lastIndex = -1;

  function newQuote() {
    const quoteText = document.getElementById('quoteText');
    const quoteAuthor = document.getElementById('quoteAuthor');

    quoteText.classList.add('fade');
    quoteAuthor.classList.add('fade');

    setTimeout(() => {
      let index;
      do {
        index = Math.floor(Math.random() * quotes.length);
      } while (index === lastIndex);
      lastIndex = index;

      quoteText.textContent = quotes[index].text;
      quoteAuthor.textContent = quotes[index].author;

      quoteText.classList.remove('fade');
      quoteAuthor.classList.remove('fade');
    }, 400);
  }

  function tweetQuote() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    const tweetUrl = `https://twitter.com/intent/tweet?text="${text}" — ${author} %23CodeAlpha %23QuoteOfTheDay`;
    window.open(tweetUrl, '_blank');
  }

  function copyQuote() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    navigator.clipboard.writeText(`"${text}" — ${author}`).then(() => {
      const msg = document.getElementById('copyMsg');
      msg.textContent = '✅ Quote copied to clipboard!';
      setTimeout(() => msg.textContent = '', 2500);
    });
  }

  // Load a quote on page open
  newQuote();
</script>

</body>
</html>
