<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Quote Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Times New Roman', Times, serif;
      transition: background 0.6s ease;
    }

    /* ── Themes ── */
    body.theme-dark   { --bg: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); --accent:#e94560; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1); }
    body.theme-sunset { --bg: linear-gradient(135deg,#f7971e,#ffd200,#f7971e); --accent:#c0392b; --card:rgba(255,255,255,0.2); --border:rgba(255,255,255,0.3); }
    body.theme-ocean  { --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);  --accent:#00b4d8; --card:rgba(255,255,255,0.05); --border:rgba(0,180,216,0.3); }
    body.theme-forest { --bg: linear-gradient(135deg,#134e5e,#71b280);          --accent:#f9ca24; --card:rgba(255,255,255,0.1); --border:rgba(249,202,36,0.3); }
    body.theme-purple { --bg: linear-gradient(135deg,#4a00e0,#8e2de2);          --accent:#ffd369; --card:rgba(255,255,255,0.1); --border:rgba(255,211,105,0.3); }
    body.theme-rose   { --bg: linear-gradient(135deg,#f953c6,#b91d73);          --accent:#fff;    --card:rgba(255,255,255,0.15); --border:rgba(255,255,255,0.3); }

    .container {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 45px 40px;
      max-width: 700px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      transition: background 0.6s, border 0.6s;
    }

    h1 { color: var(--accent); font-size:1.6rem; margin-bottom:10px; letter-spacing:2px; text-transform:uppercase; transition:color 0.4s; }
    .divider { width:60px; height:3px; background:var(--accent); margin:10px auto 30px; border-radius:5px; transition:background 0.4s; }
    .quote-icon { font-size:4rem; color:rgba(255,255,255,0.15); line-height:1; margin-bottom:10px; }
    .quote-text { font-size:1.2rem; color:#fff; line-height:1.8; font-style:italic; min-height:80px; transition:opacity 0.4s ease; }
    .quote-author { margin-top:18px; font-size:1rem; color:var(--accent); font-weight:600; letter-spacing:1px; transition:opacity 0.4s ease, color 0.4s; }
    .quote-author::before { content:"— "; }

    /* ── Theme Picker ── */
    .theme-picker { display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .theme-dot {
      width:28px; height:28px; border-radius:50%; cursor:pointer;
      border:3px solid transparent; transition:transform 0.2s, border 0.2s;
    }
    .theme-dot:hover, .theme-dot.active { transform:scale(1.25); border-color:#fff; }
    .dot-dark   { background:linear-gradient(135deg,#1a1a2e,#0f3460); }
    .dot-sunset { background:linear-gradient(135deg,#f7971e,#ffd200); }
    .dot-ocean  { background:linear-gradient(135deg,#0f2027,#2c5364); }
    .dot-forest { background:linear-gradient(135deg,#134e5e,#71b280); }
    .dot-purple { background:linear-gradient(135deg,#4a00e0,#8e2de2); }
    .dot-rose   { background:linear-gradient(135deg,#f953c6,#b91d73); }

    /* ── Buttons ── */
    .buttons { margin-top:25px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }

    button {
      padding:10px 18px; border:none; border-radius:50px;
      font-size:0.85rem; font-weight:600; cursor:pointer;
      transition:all 0.3s ease; letter-spacing:0.5px;
    }

    .btn-new    { background:var(--accent); color:#fff; }
    .btn-new:hover { filter:brightness(0.85); transform:translateY(-3px); }

    .btn-shuffle { background:transparent; color:#a78bfa; border:2px solid #a78bfa; }
    .btn-shuffle:hover { background:#a78bfa; color:#1a1a2e; transform:translateY(-3px); }
    .btn-shuffle.shuffling { animation:spin 0.5s linear; }

    .btn-speak { background:transparent; color:#4fc3f7; border:2px solid #4fc3f7; }
    .btn-speak:hover { background:#4fc3f7; color:#1a1a2e; transform:translateY(-3px); }
    .btn-speak.speaking { background:#4fc3f7; color:#1a1a2e; animation:pulse 1s infinite; }

    .btn-fav { background:transparent; color:#ffd369; border:2px solid #ffd369; }
    .btn-fav:hover { background:#ffd369; color:#1a1a2e; transform:translateY(-3px); }
    .btn-fav.saved { background:#ffd369; color:#1a1a2e; }

    .btn-copy { background:transparent; color:#aaa; border:2px solid #aaa; }
    .btn-copy:hover { background:#aaa; color:#1a1a2e; transform:translateY(-3px); }

    .btn-save { background:transparent; color:#6ee7b7; border:2px solid #6ee7b7; }
    .btn-save:hover { background:#6ee7b7; color:#1a1a2e; transform:translateY(-3px); }
    .btn-save.saving { animation:pulse 0.8s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes spin   { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    .copy-msg { color:#4caf50; font-size:0.82rem; margin-top:10px; height:18px; }

    /* ── Favourites ── */
    .btn-toggle-fav { background:transparent; color:#ffd369; border:none; font-size:0.82rem; cursor:pointer; margin-top:10px; text-decoration:underline; padding:0; }
    .fav-section { margin-top:20px; display:none; }
    .fav-section.open { display:block; }
    .fav-title { color:#ffd369; font-size:1rem; font-weight:600; margin-bottom:12px; text-align:left; border-bottom:1px solid rgba(255,211,105,0.3); padding-bottom:8px; }
    .fav-list { max-height:180px; overflow-y:auto; text-align:left; }
    .fav-item { background:rgba(255,255,255,0.05); border-radius:10px; padding:12px 15px; margin-bottom:8px; border-left:3px solid #ffd369; }
    .fav-item p { color:#fff; font-size:0.85rem; font-style:italic; line-height:1.5; }
    .fav-item span { color:#ffd369; font-size:0.78rem; font-weight:600; }
    .fav-empty { color:rgba(255,255,255,0.3); font-size:0.85rem; text-align:center; padding:15px; }
    .btn-clear-fav { margin-top:10px; background:transparent; color:#e94560; border:1px solid #e94560; padding:6px 16px; font-size:0.8rem; border-radius:20px; cursor:pointer; }
    .btn-clear-fav:hover { background:#e94560; color:#fff; }
    .fav-list::-webkit-scrollbar { width:4px; }
    .fav-list::-webkit-scrollbar-thumb { background:#ffd369; border-radius:4px; }

    .footer { margin-top:22px; color:rgba(255,255,255,0.2); font-size:0.72rem; }
    .fade { opacity:0; }

    /* ── Save as Image card (hidden, used for screenshot) ── */
    #snapCard {
      position:fixed; top:-9999px; left:-9999px;
      width:600px; padding:60px 50px;
      text-align:center;
      font-family:'Segoe UI',sans-serif;
    }
    #snapCard .snap-quote { font-size:1.4rem; font-style:italic; color:#fff; line-height:1.8; }
    #snapCard .snap-author { margin-top:20px; font-size:1rem; font-weight:700; }
    #snapCard .snap-brand { margin-top:30px; font-size:0.75rem; color:rgba(255,255,255,0.4); }
  </style>
</head>
<body class="theme-dark">

<!-- Hidden card for image export -->
<div id="snapCard">
  <div style="font-size:3rem;margin-bottom:10px;opacity:0.3">"</div>
  <p class="snap-quote" id="snapQuote"></p>
  <p class="snap-author" id="snapAuthor"></p>
  <p class="snap-brand">QuoteVerse • CodeAlpha Internship</p>
</div>

<div class="container">
  <h1>✨ Quote of the Moment</h1>
  <div class="divider"></div>

  <!-- Theme Picker -->
  <div class="theme-picker">
    <div class="theme-dot dot-dark   active" onclick="setTheme('dark')"   title="Dark"></div>
    <div class="theme-dot dot-sunset"        onclick="setTheme('sunset')" title="Sunset"></div>
    <div class="theme-dot dot-ocean"         onclick="setTheme('ocean')"  title="Ocean"></div>
    <div class="theme-dot dot-forest"        onclick="setTheme('forest')" title="Forest"></div>
    <div class="theme-dot dot-purple"        onclick="setTheme('purple')" title="Purple"></div>
    <div class="theme-dot dot-rose"          onclick="setTheme('rose')"   title="Rose"></div>
  </div>

  <div class="quote-icon">"</div>
  <p class="quote-text"   id="quoteText">Click the button to get inspired!</p>
  <p class="quote-author" id="quoteAuthor">CodeAlpha</p>

  <div class="buttons">
    <button class="btn-new"     onclick="newQuote()">🔄 New Quote</button>
    <button class="btn-shuffle" id="shuffleBtn" onclick="shuffleQuote()">🔀 Shuffle</button>
    <button class="btn-speak"   id="speakBtn"   onclick="readAloud()">🔊 Read Aloud</button>
    <button class="btn-fav"     id="favBtn"     onclick="toggleFavourite()">❤️ Favourite</button>
    <button class="btn-copy"    onclick="copyQuote()">📋 Copy</button>
    <button class="btn-save"    id="saveBtn"    onclick="saveAsImage()">📸 Save Image</button>
  </div>

  <p class="copy-msg" id="copyMsg"></p>

  <button class="btn-toggle-fav" onclick="toggleFavPanel()">⭐ View Favourites (<span id="favCount">0</span>)</button>

  <div class="fav-section" id="favSection">
    <div class="fav-title">⭐ My Favourite Quotes</div>
    <div class="fav-list" id="favList">
      <p class="fav-empty">No favourites yet. Click ❤️ to save quotes!</p>
    </div>
    <button class="btn-clear-fav" onclick="clearFavourites()">🗑️ Clear All</button>
  </div>

  <div class="footer">CodeAlpha Internship — App Development | Amanulla Fathima Amna</div>
</div>

<script>
  const quotes = [
    { text:"The only way to do great work is to love what you do.", author:"Steve Jobs" },
    { text:"In the middle of every difficulty lies opportunity.", author:"Albert Einstein" },
    { text:"It does not matter how slowly you go as long as you do not stop.", author:"Confucius" },
    { text:"Life is what happens when you're busy making other plans.", author:"John Lennon" },
    { text:"The future belongs to those who believe in the beauty of their dreams.", author:"Eleanor Roosevelt" },
    { text:"Success is not final, failure is not fatal: it is the courage to continue that counts.", author:"Winston Churchill" },
    { text:"Believe you can and you're halfway there.", author:"Theodore Roosevelt" },
    { text:"You miss 100% of the shots you don't take.", author:"Wayne Gretzky" },
    { text:"Whether you think you can or you think you can't, you're right.", author:"Henry Ford" },
    { text:"The best time to plant a tree was 20 years ago. The second best time is now.", author:"Chinese Proverb" },
    { text:"Spread love everywhere you go.", author:"Mother Teresa" },
    { text:"Always remember that you are absolutely unique.", author:"Margaret Mead" },
    { text:"Do not go where the path may lead, go instead where there is no path and leave a trail.", author:"Ralph Waldo Emerson" },
    { text:"The greatest glory in living lies not in never falling, but in rising every time we fall.", author:"Nelson Mandela" },
    { text:"In the end, it's not the years in your life that count. It's the life in your years.", author:"Abraham Lincoln" },
    { text:"Life is either a daring adventure or nothing at all.", author:"Helen Keller" },
    { text:"Code is like humor. When you have to explain it, it's bad.", author:"Cory House" },
    { text:"First, solve the problem. Then, write the code.", author:"John Johnson" },
    { text:"Dream big and dare to fail.", author:"Norman Vaughan" },
    { text:"The secret of getting ahead is getting started.", author:"Mark Twain" },
    { text:"Don't watch the clock; do what it does. Keep going.", author:"Sam Levenson" },
    { text:"Keep your face always toward the sunshine, and shadows will fall behind you.", author:"Walt Whitman" },
    { text:"You are never too old to set another goal or to dream a new dream.", author:"C.S. Lewis" },
    { text:"Everything you've ever wanted is on the other side of fear.", author:"George Addair" },
    { text:"Hardships often prepare ordinary people for an extraordinary destiny.", author:"C.S. Lewis" },
  ];

  // Theme backgrounds for snap card
  const themeBgs = {
    dark:   'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',
    sunset: 'linear-gradient(135deg,#f7971e,#ffd200,#f7971e)',
    ocean:  'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
    forest: 'linear-gradient(135deg,#134e5e,#71b280)',
    purple: 'linear-gradient(135deg,#4a00e0,#8e2de2)',
    rose:   'linear-gradient(135deg,#f953c6,#b91d73)',
  };
  const themeAccents = { dark:'#e94560', sunset:'#c0392b', ocean:'#00b4d8', forest:'#f9ca24', purple:'#ffd369', rose:'#fff' };

  let lastIndex = -1;
  let favourites = [];
  let isSpeaking = false;
  let currentTheme = 'dark';

  function setTheme(theme) {
    document.body.className = 'theme-' + theme;
    currentTheme = theme;
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    document.querySelector('.dot-' + theme).classList.add('active');
  }

  function getRandomIndex() {
    let i;
    do { i = Math.floor(Math.random() * quotes.length); } while (i === lastIndex);
    lastIndex = i; return i;
  }

  function displayQuote(index) {
    const qt = document.getElementById('quoteText');
    const qa = document.getElementById('quoteAuthor');
    qt.classList.add('fade'); qa.classList.add('fade');
    stopSpeaking();
    setTimeout(() => {
      qt.textContent = quotes[index].text;
      qa.textContent = quotes[index].author;
      qt.classList.remove('fade'); qa.classList.remove('fade');
      const favBtn = document.getElementById('favBtn');
      const saved = favourites.some(f => f.text === quotes[index].text);
      favBtn.classList.toggle('saved', saved);
      favBtn.textContent = saved ? '💛 Saved!' : '❤️ Favourite';
    }, 400);
  }

  function newQuote() { displayQuote(getRandomIndex()); }

  function shuffleQuote() {
    const btn = document.getElementById('shuffleBtn');
    btn.classList.add('shuffling');
    setTimeout(() => btn.classList.remove('shuffling'), 500);
    const qt = document.getElementById('quoteText');
    const qa = document.getElementById('quoteAuthor');
    let count = 0;
    const iv = setInterval(() => {
      const i = Math.floor(Math.random() * quotes.length);
      qt.textContent = quotes[i].text;
      qa.textContent = quotes[i].author;
      count++;
      if (count >= 5) {
        clearInterval(iv);
        const final = getRandomIndex();
        qt.textContent = quotes[final].text;
        qa.textContent = quotes[final].author;
        const favBtn = document.getElementById('favBtn');
        const saved = favourites.some(f => f.text === quotes[final].text);
        favBtn.classList.toggle('saved', saved);
        favBtn.textContent = saved ? '💛 Saved!' : '❤️ Favourite';
      }
    }, 100);
  }

  function stopSpeaking() {
    window.speechSynthesis.cancel(); isSpeaking = false;
    const b = document.getElementById('speakBtn');
    b.classList.remove('speaking'); b.textContent = '🔊 Read Aloud';
  }

  function readAloud() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    const b = document.getElementById('speakBtn');
    if (isSpeaking) { stopSpeaking(); return; }
    const u = new SpeechSynthesisUtterance(text + ' by ' + author);
    u.rate = 0.9; u.pitch = 1;
    u.onstart = () => { isSpeaking=true; b.classList.add('speaking'); b.textContent='⏹ Stop'; };
    u.onend   = () => { isSpeaking=false; b.classList.remove('speaking'); b.textContent='🔊 Read Aloud'; };
    window.speechSynthesis.speak(u);
  }

  function toggleFavourite() {
    const text = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    const btn = document.getElementById('favBtn');
    const idx = favourites.findIndex(f => f.text === text);
    if (idx !== -1) {
      favourites.splice(idx,1); btn.classList.remove('saved'); btn.textContent='❤️ Favourite'; showMsg('💔 Removed from favourites');
    } else {
      favourites.push({text,author}); btn.classList.add('saved'); btn.textContent='💛 Saved!'; showMsg('❤️ Added to favourites!');
    }
    document.getElementById('favCount').textContent = favourites.length;
    renderFavourites();
  }

  function toggleFavPanel() { document.getElementById('favSection').classList.toggle('open'); }

  function renderFavourites() {
    const list = document.getElementById('favList');
    if (!favourites.length) { list.innerHTML='<p class="fav-empty">No favourites yet. Click ❤️ to save quotes!</p>'; return; }
    list.innerHTML = favourites.map(f=>'<div class="fav-item"><p>"'+f.text+'"</p><span>— '+f.author+'</span></div>').join('');
  }

  function clearFavourites() {
    favourites=[];
    document.getElementById('favCount').textContent=0;
    document.getElementById('favBtn').classList.remove('saved');
    document.getElementById('favBtn').textContent='❤️ Favourite';
    renderFavourites(); showMsg('🗑️ Favourites cleared!');
  }

  function copyQuote() {
    const t = document.getElementById('quoteText').textContent;
    const a = document.getElementById('quoteAuthor').textContent;
    navigator.clipboard.writeText('"'+t+'" — '+a).then(()=>showMsg('✅ Quote copied to clipboard!'));
  }

  function saveAsImage() {
    const text   = document.getElementById('quoteText').textContent;
    const author = document.getElementById('quoteAuthor').textContent;
    const card   = document.getElementById('snapCard');
    const btn    = document.getElementById('saveBtn');

    // Style snap card with current theme
    card.style.background = themeBgs[currentTheme];
    document.getElementById('snapQuote').style.color = '#ffffff';
    document.getElementById('snapAuthor').style.color = themeAccents[currentTheme];
    document.getElementById('snapQuote').textContent  = '"' + text + '"';
    document.getElementById('snapAuthor').textContent = '— ' + author;

    // Temporarily show it off-screen
    card.style.top  = '-9999px';
    card.style.left = '0px';

    btn.classList.add('saving'); btn.textContent = '⏳ Saving...';

    html2canvas(card, { scale:2, useCORS:true, backgroundColor:null }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'quote-' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.classList.remove('saving'); btn.textContent = '📸 Save Image';
      showMsg('🖼️ Image downloaded!');
      card.style.top = '-9999px';
    });
  }

  function showMsg(msg) {
    const el = document.getElementById('copyMsg');
    el.textContent = msg;
    setTimeout(()=>el.textContent='', 2500);
  }

  newQuote();
</script>
</body>
</html>
